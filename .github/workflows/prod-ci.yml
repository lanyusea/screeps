name: prod-ci

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: prod-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-prod:
    name: Verify prod TypeScript, Jest, and bundle
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: prod

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Verify dependency tree
        run: |
          node - <<'NODE'
          const fs = require("fs");
          const path = require("path");

          const packages = [
            "typescript",
            "jest",
            "ts-jest",
            "@types/jest",
            "@types/screeps",
            "esbuild",
          ];

          for (const name of packages) {
            const packageJsonPath = path.join(process.cwd(), "node_modules", ...name.split("/"), "package.json");
            const { version } = JSON.parse(fs.readFileSync(packageJsonPath, "utf8"));
            console.log(`${name}@${version}`);
          }
          NODE

      - name: Typecheck
        run: npm run typecheck

      - name: Run Jest in-band
        run: npm test -- --runInBand

      - name: Build bundled Screeps artifact
        run: npm run build

      - name: Verify build artifact
        run: test -f dist/main.js
