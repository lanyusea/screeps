name: prod-ci

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: prod-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-prod:
    name: Verify prod TypeScript, Jest, and bundle
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: prod

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: prod/package-lock.json

      - name: Report Node.js toolchain
        run: |
          node --version
          npm --version

      - name: Install dependencies
        env:
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
        run: |
          set -o pipefail
          max_attempts=3
          npm_ci_status=1
          required_package_files=(
            node_modules/typescript/package.json
            node_modules/jest/package.json
            node_modules/ts-jest/package.json
            node_modules/@types/jest/package.json
            node_modules/@types/screeps/package.json
            node_modules/esbuild/package.json
          )

          for attempt in 1 2 3; do
            log_path="$RUNNER_TEMP/npm-ci-attempt-${attempt}.log"
            echo "Running npm ci attempt ${attempt}/${max_attempts}"

            set +e
            npm ci 2>&1 | tee "$log_path"
            npm_ci_status=${PIPESTATUS[0]}
            set -e

            cp "$log_path" "$RUNNER_TEMP/npm-ci.log"

            attempt_failed=0
            failure_reasons=()

            if [ "$npm_ci_status" -ne 0 ]; then
              attempt_failed=1
              failure_reasons+=("exit code ${npm_ci_status}")
            fi

            if grep -Eq "^npm (ERR!|error) " "$RUNNER_TEMP/npm-ci.log"; then
              attempt_failed=1
              failure_reasons+=("npm error output")
            fi

            missing_package_files=()
            for package_file in "${required_package_files[@]}"; do
              if [ ! -f "$package_file" ]; then
                missing_package_files+=("$package_file")
              fi
            done

            if [ "${#missing_package_files[@]}" -gt 0 ]; then
              attempt_failed=1
              failure_reasons+=("missing required package files")
              echo "::warning::npm ci attempt ${attempt}/${max_attempts} left required package files missing:"
              printf '  %s\n' "${missing_package_files[@]}"
            fi

            if [ "$attempt_failed" -eq 0 ]; then
              break
            fi

            if [ "$attempt" -lt "$max_attempts" ]; then
              IFS=", "
              echo "npm ci attempt ${attempt}/${max_attempts} failed validation: ${failure_reasons[*]}; retrying shortly."
              unset IFS
              sleep 10
            fi
          done

          if [ "$attempt_failed" -ne 0 ]; then
            IFS=", "
            echo "::error::npm ci failed validation after ${max_attempts} attempts: ${failure_reasons[*]}."
            unset IFS

            if [ "${#missing_package_files[@]}" -gt 0 ]; then
              echo "::error::Latest attempt is missing required package files:"
              printf '  %s\n' "${missing_package_files[@]}"
            fi

            exit 1
          fi

      - name: Verify dependency tree
        run: |
          node - <<'NODE'
          const fs = require("fs");
          const path = require("path");

          const packages = [
            "typescript",
            "jest",
            "ts-jest",
            "@types/jest",
            "@types/screeps",
            "esbuild",
          ];

          for (const name of packages) {
            const packageJsonPath = path.join(process.cwd(), "node_modules", ...name.split("/"), "package.json");
            const { version } = JSON.parse(fs.readFileSync(packageJsonPath, "utf8"));
            console.log(`${name}@${version}`);
          }
          NODE
          npx esbuild --version

      - name: Typecheck
        run: npm run typecheck

      - name: Run Jest in-band
        run: npm test -- --runInBand

      - name: Build bundled Screeps artifact
        run: npm run build

      - name: Verify build artifact
        run: test -f dist/main.js
