name: roadmap-pages-refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write
  issues: read
  pull-requests: write
  repository-projects: read
  pages: write

concurrency:
  group: roadmap-pages-refresh
  cancel-in-progress: false

jobs:
  refresh-pages-artifacts:
    name: Refresh committed Pages roadmap artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ secrets.SCREEPS_ROADMAP_TOKEN || github.token }}
      GITHUB_TOKEN: ${{ secrets.SCREEPS_ROADMAP_TOKEN || github.token }}
      SCREEPS_AUTH_TOKEN: ${{ secrets.SCREEPS_AUTH_TOKEN }}

    steps:
      - name: Checkout main
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: main
          fetch-depth: 0
          lfs: true
          token: ${{ secrets.SCREEPS_ROADMAP_TOKEN || github.token }}
          persist-credentials: true

      - name: Report toolchain
        run: |
          python3 --version
          gh --version
          git lfs version

      - name: Configure Git identity
        run: |
          git config user.name "lanyusea's bot"
          git config user.email "lanyusea@gmail.com"
          git lfs install --local

      - name: Capture live Screeps runtime summary
        run: |
          mkdir -p runtime-artifacts/screeps-monitor runtime-artifacts/runtime-summary-console runtime-artifacts/cron-output
          if [ -z "${SCREEPS_AUTH_TOKEN:-}" ]; then
            echo "::warning::SCREEPS_AUTH_TOKEN is not configured; skipping live Screeps runtime summary capture."
            exit 0
          fi
          python3 scripts/screeps-runtime-monitor.py summary \
            --out-dir runtime-artifacts/screeps-monitor \
            --runtime-summary-out-dir runtime-artifacts/runtime-summary-console \
            > runtime-artifacts/screeps-monitor/summary.json

      - name: Generate roadmap Pages artifacts
        run: |
          python3 scripts/generate-roadmap-page.py \
            --repo . \
            --docs-dir docs \
            --db docs/roadmap-kpi.sqlite \
            --cron-output-root runtime-artifacts/cron-output
          rm -f docs/roadmap-kpi.sqlite-wal docs/roadmap-kpi.sqlite-shm
          test ! -e docs/roadmap-kpi.sqlite-wal
          test ! -e docs/roadmap-kpi.sqlite-shm

      - name: Verify generated Pages freshness
        run: |
          python3 scripts/check-roadmap-pages-freshness.py \
            . \
            --max-age-hours 2 \
            --require-live-github

      - name: Commit generated Pages artifacts
        id: commit
        run: |
          refresh_branch="chore/roadmap-pages-refresh"
          git add docs/index.html docs/roadmap-data.json docs/roadmap-kpi.sqlite
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No generated Pages artifact changes."
            exit 0
          fi
          git commit -m "chore(roadmap): refresh Pages artifacts [skip ci]"
          git fetch origin "$refresh_branch" || true
          git push --force-with-lease origin HEAD:"$refresh_branch"
          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "branch=$refresh_branch" >> "$GITHUB_OUTPUT"

      - name: Open or update Pages refresh PR
        if: steps.commit.outputs.changed == 'true'
        run: |
          refresh_branch="${{ steps.commit.outputs.branch }}"
          pr_number="$(gh pr list --head "$refresh_branch" --state open --json number --jq '.[0].number // empty')"
          body_file="$(mktemp)"
          cat > "$body_file" <<'EOF'
          Automated roadmap Pages artifact refresh.

          This PR was opened by the scheduled `roadmap-pages-refresh` workflow because branch protection requires generated docs changes to pass through a pull request.

          Verification already run in the workflow:
          - generated `docs/index.html`, `docs/roadmap-data.json`, and `docs/roadmap-kpi.sqlite`
          - `python3 scripts/check-roadmap-pages-freshness.py . --max-age-hours 2 --require-live-github`
          EOF
          if [ -n "$pr_number" ]; then
            gh pr edit "$pr_number" --title "chore(roadmap): refresh Pages artifacts" --body-file "$body_file"
            echo "Updated existing Pages refresh PR #$pr_number."
          else
            gh pr create \
              --base main \
              --head "$refresh_branch" \
              --title "chore(roadmap): refresh Pages artifacts" \
              --body-file "$body_file"
          fi

      - name: Request legacy Pages rebuild
        if: steps.commit.outputs.changed != 'true'
        run: gh api -X POST "repos/${GITHUB_REPOSITORY}/pages/builds" --silent
