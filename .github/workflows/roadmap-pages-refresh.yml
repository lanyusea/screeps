name: roadmap-pages-refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write
  issues: read
  pull-requests: write
  repository-projects: read
  pages: write

concurrency:
  group: roadmap-pages-refresh
  cancel-in-progress: false

jobs:
  refresh-pages-artifacts:
    name: Refresh committed Pages roadmap artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ secrets.SCREEPS_ROADMAP_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.SCREEPS_ROADMAP_TOKEN }}
      SCREEPS_ROADMAP_ALLOW_BROAD_PROJECT_SCAN: "1"
      SCREEPS_AUTH_TOKEN: ${{ secrets.SCREEPS_AUTH_TOKEN }}
      SCREEPS_MONITOR_CACHE_DIR: runtime-artifacts/screeps-monitor/terrain-cache
      SCREEPS_MONITOR_STATE_FILE: runtime-artifacts/screeps-monitor/state.json
      PAGES_REFRESH_BRANCH: automation/roadmap-pages-refresh

    steps:
      - name: Require roadmap automation token
        env:
          SCREEPS_ROADMAP_TOKEN_CONFIGURED: ${{ secrets.SCREEPS_ROADMAP_TOKEN != '' }}
        run: |
          if [ "${SCREEPS_ROADMAP_TOKEN_CONFIGURED}" != "true" ]; then
            echo "::error::SCREEPS_ROADMAP_TOKEN is required so generated artifact PRs trigger normal repository checks."
            exit 1
          fi

      - name: Checkout main
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: main
          fetch-depth: 0
          lfs: true
          token: ${{ secrets.SCREEPS_ROADMAP_TOKEN }}
          persist-credentials: true

      - name: Report toolchain
        run: |
          python3 --version
          gh --version
          git lfs version

      - name: Configure Git identity
        run: |
          git config user.name "lanyusea's bot"
          git config user.email "lanyusea@gmail.com"
          git lfs install --local

      - name: Capture live Screeps runtime summary
        run: |
          mkdir -p runtime-artifacts/screeps-monitor runtime-artifacts/runtime-summary-console runtime-artifacts/cron-output
          if [ -z "${SCREEPS_AUTH_TOKEN:-}" ]; then
            echo "::warning::SCREEPS_AUTH_TOKEN is not configured; skipping live Screeps runtime summary capture."
            exit 0
          fi
          set +e
          python3 scripts/screeps-runtime-monitor.py summary \
            --out-dir runtime-artifacts/screeps-monitor \
            --runtime-summary-out-dir runtime-artifacts/runtime-summary-console \
            > runtime-artifacts/screeps-monitor/summary.json
          summary_status=$?
          set -e
          if [ "${summary_status}" -ne 0 ]; then
            echo "::error::Live Screeps runtime summary capture failed; sanitized monitor payload follows."
            python3 - <<'PY'
          import json
          from pathlib import Path
          payload_path = Path("runtime-artifacts/screeps-monitor/summary.json")
          try:
              payload = json.loads(payload_path.read_text(encoding="utf-8"))
          except Exception as exc:  # noqa: BLE001 - diagnostics only
              print(f"summary_payload_unavailable={exc.__class__.__name__}: {exc}")
          else:
              print("summary_ok=", payload.get("ok"))
              print("summary_mode=", payload.get("mode"))
              print("summary_error=", payload.get("error"))
              warnings = payload.get("warnings") if isinstance(payload.get("warnings"), list) else []
              print("summary_warning_count=", len(warnings))
              for warning in warnings[:12]:
                  print("summary_warning=", str(warning)[:500])
          PY
            exit "${summary_status}"
          fi

      - name: Generate roadmap Pages artifacts
        run: |
          python3 scripts/generate-roadmap-page.py \
            --repo . \
            --docs-dir docs \
            --db docs/roadmap-kpi.sqlite \
            --cron-output-root runtime-artifacts/cron-output
          rm -f docs/roadmap-kpi.sqlite-wal docs/roadmap-kpi.sqlite-shm
          test ! -e docs/roadmap-kpi.sqlite-wal
          test ! -e docs/roadmap-kpi.sqlite-shm

      - name: Verify generated Pages freshness
        run: |
          python3 scripts/check-roadmap-pages-freshness.py \
            . \
            --max-age-hours 2 \
            --require-live-github

      - name: Commit generated Pages artifacts
        id: commit
        run: |
          git add docs/index.html docs/roadmap-data.json docs/roadmap-kpi.sqlite
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No generated Pages artifact changes."
            exit 0
          fi
          git commit -m "chore(roadmap): refresh Pages artifacts"
          if git ls-remote --exit-code --heads origin "${PAGES_REFRESH_BRANCH}" >/dev/null 2>&1; then
            git fetch origin "+refs/heads/${PAGES_REFRESH_BRANCH}:refs/remotes/origin/${PAGES_REFRESH_BRANCH}"
          fi
          git push --force-with-lease origin HEAD:"${PAGES_REFRESH_BRANCH}"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Create or update Pages artifacts PR
        if: steps.commit.outputs.changed == 'true'
        env:
          PR_TITLE: "chore(roadmap): refresh Pages artifacts"
          PR_BODY: |
            Refreshes the generated roadmap Pages artifacts.

            Generated by the scheduled roadmap Pages refresh workflow.
        run: |
          existing_pr="$(gh pr list --base main --head "${PAGES_REFRESH_BRANCH}" --state open --limit 1 --json number --jq '.[0].number // empty')"
          if [ -n "${existing_pr}" ]; then
            gh pr edit "${existing_pr}" --title "${PR_TITLE}" --body "${PR_BODY}"
            echo "Updated existing roadmap Pages refresh PR #${existing_pr}."
          else
            gh pr create --base main --head "${PAGES_REFRESH_BRANCH}" --title "${PR_TITLE}" --body "${PR_BODY}"
          fi

      - name: Request legacy Pages rebuild
        if: steps.commit.outputs.changed == 'false'
        run: gh api -X POST "repos/${GITHUB_REPOSITORY}/pages/builds" --silent
