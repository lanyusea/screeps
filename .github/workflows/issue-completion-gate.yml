name: issue-completion-gate

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Optional PR number to validate after self-test"
        required: false
        type: string

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: issue-completion-gate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate-issue-completion:
    name: Validate issue completion gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Report Python toolchain
        run: python3 --version

      - name: Run validator self-test
        run: python3 scripts/check_issue_completion_gate.py --self-test

      - name: Validate current pull request body and commits
        if: github.event_name == 'pull_request'
        run: |
          python3 scripts/check_issue_completion_gate.py \
            --repo "${GITHUB_REPOSITORY}" \
            --pr "${{ github.event.pull_request.number }}"

      - name: Validate requested pull request body and commits
        if: github.event_name == 'workflow_dispatch' && inputs.pr_number != ''
        run: |
          python3 scripts/check_issue_completion_gate.py \
            --repo "${GITHUB_REPOSITORY}" \
            --pr "${{ inputs.pr_number }}"
