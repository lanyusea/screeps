have_fun: false

memory_config:
  disabled: false

code_review:
  disable: false
  comment_severity_threshold: CRITICAL
  max_review_comments: 10
  pull_request_opened:
    help: false
    summary: false
    code_review: true
    include_drafts: false

ignore_patterns:
  - "**/node_modules/**"
  - "**/.git/**"
  - "**/coverage/**"
  - "**/.nyc_output/**"
  - "**/.cache/**"
  - "**/tmp/**"
  - "**/runtime-artifacts/**"
  - "**/*.png"
  - "**/*.jpg"
  - "**/*.jpeg"
  - "**/*.webp"
  - "**/*.gif"
  - "**/*.svg"
  - "prod/dist/**"
  - "prod/package-lock.json"
